<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pod Performance Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #000; 
            color: #fff; 
            min-height: 100vh; 
            padding: 12px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header h1 { font-size: 20px; font-weight: 700; }
        .header .subtitle { font-size: 12px; color: #888; }
        .header .updated { font-size: 11px; color: #666; }
        
        .pod-selector {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .pod-btn {
            padding: 8px 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            font-size: 12px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pod-btn:hover { background: #2a2a2a; color: #fff; }
        .pod-btn.active { background: #5BA4B5; border-color: #5BA4B5; color: #fff; }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .card {
            background: #1a1a1a;
            padding: 14px;
            border-radius: 8px;
            text-align: center;
        }
        .card .value { font-size: 24px; font-weight: 700; color: #5BA4B5; }
        .card .value.green { color: #4ade80; }
        .card .value.red { color: #ef4444; }
        .card .value.yellow { color: #fbbf24; }
        .card .label { font-size: 10px; color: #888; text-transform: uppercase; margin-top: 4px; }
        
        .comparison {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .comparison h3 { font-size: 12px; color: #888; margin-bottom: 10px; text-transform: uppercase; }
        .comparison-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
            font-size: 13px;
        }
        .comparison-row:last-child { border-bottom: none; }
        .comparison-row .pod-name { color: #fff; }
        .comparison-row .pod-stats { color: #888; font-size: 11px; }
        .comparison-row.current { background: #5BA4B522; margin: 0 -12px; padding: 8px 12px; border-radius: 4px; }
        .comparison-row .rank { 
            display: inline-block;
            width: 20px;
            height: 20px;
            background: #333;
            border-radius: 50%;
            text-align: center;
            line-height: 20px;
            font-size: 11px;
            margin-right: 8px;
        }
        .comparison-row.current .rank { background: #5BA4B5; }
        
        .rep-table {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
        }
        .rep-table h3 { 
            font-size: 12px; 
            color: #888; 
            text-transform: uppercase; 
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        .rep-header, .rep-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr;
            padding: 10px 12px;
            font-size: 12px;
            align-items: center;
        }
        .rep-header {
            background: #111;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 10px;
        }
        .rep-row { border-bottom: 1px solid #222; }
        .rep-row:last-child { border-bottom: none; }
        .rep-row:hover { background: #222; }
        .rep-row .name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rep-row .goal-pct { font-weight: 600; }
        .rep-row .goal-pct.on-track { color: #4ade80; }
        .rep-row .goal-pct.behind { color: #fbbf24; }
        .rep-row .goal-pct.critical { color: #ef4444; }
        .rep-row .green-rate { color: #4ade80; }
        .rep-row .drop-rate { color: #ef4444; }
        
        .flag { 
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 600;
            margin-left: 6px;
        }
        .flag.top { background: #4ade8033; color: #4ade80; }
        .flag.alert { background: #ef444433; color: #ef4444; }
        
        .legend {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 16px;
            font-size: 11px;
            color: #666;
        }
        .legend span { display: flex; align-items: center; gap: 4px; }
        .legend .dot { width: 8px; height: 8px; border-radius: 50%; }
        .legend .dot.green { background: #4ade80; }
        .legend .dot.yellow { background: #fbbf24; }
        .legend .dot.red { background: #ef4444; }
        
        @media (max-width: 600px) {
            .rep-header, .rep-row {
                grid-template-columns: 1.5fr 1fr 1fr 1fr;
                font-size: 11px;
                padding: 8px 10px;
            }
            .rep-header .hide-mobile, .rep-row .hide-mobile { display: none; }
            .card .value { font-size: 20px; }
            .pod-btn { padding: 6px 10px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 id="podTitle">Loading...</h1>
                <div class="subtitle" id="monthLabel"></div>
            </div>
            <div class="updated" id="lastUpdated"></div>
        </div>
        
        <div class="pod-selector" id="podSelector"></div>
        
        <div class="summary-cards" id="summaryCards"></div>
        
        <div class="comparison" id="comparisonSection">
            <h3>SFL Pod Rankings — % to Goal</h3>
            <div id="comparisonRows"></div>
        </div>
        
        <div class="rep-table">
            <h3 id="repTableTitle">Rep Performance</h3>
            <div class="rep-header">
                <div>Rep</div>
                <div>Leads</div>
                <div>Signed</div>
                <div>CV</div>
                <div>Drops</div>
                <div class="hide-mobile">% Goal</div>
            </div>
            <div id="repRows"></div>
        </div>
        
        <div class="legend">
            <span><div class="dot green"></div> Crushing It (≥140%)</span>
            <span><div class="dot red"></div> Behind Pace</span>
        </div>
    </div>
    
    <script>
        let data = null;
        let currentPod = 'SFL';
        
        async function fetchData() {
            try {
                const res = await fetch('data.json?' + Date.now());
                data = await res.json();
                renderPodSelector();
                renderDashboard();
            } catch (e) {
                document.getElementById('podTitle').textContent = 'Error loading data';
                console.error(e);
            }
        }
        
        function renderPodSelector() {
            const container = document.getElementById('podSelector');
            const pods = Object.values(data.pods).sort((a, b) => b.goalPct - a.goalPct);
            
            container.innerHTML = pods.map(pod => 
                `<button class="pod-btn ${pod.code === currentPod ? 'active' : ''}" data-pod="${pod.code}">${pod.leader}</button>`
            ).join('');
            
            container.querySelectorAll('.pod-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentPod = btn.dataset.pod;
                    container.querySelectorAll('.pod-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderDashboard();
                });
            });
        }
        
        function renderDashboard() {
            const pod = data.pods[currentPod];
            const paceThreshold = data.paceThreshold || 83;
            
            document.getElementById('podTitle').textContent = `${pod.leader}'s Pod`;
            document.getElementById('monthLabel').textContent = `${data.month} MTD (Day ${data.day})`;
            document.getElementById('lastUpdated').textContent = `Updated: ${new Date(data.updated).toLocaleString()}`;
            document.getElementById('repTableTitle').textContent = `Rep Performance — ${pod.repCount} Reps`;
            
            // Summary cards
            const goalClass = pod.goalPct >= 140 ? 'green' : pod.goalPct >= paceThreshold ? '' : 'red';
            document.getElementById('summaryCards').innerHTML = `
                <div class="card">
                    <div class="value">${pod.signed}</div>
                    <div class="label">Signed</div>
                </div>
                <div class="card">
                    <div class="value">${Math.round(pod.goal)}</div>
                    <div class="label">Goal</div>
                </div>
                <div class="card">
                    <div class="value ${goalClass}">${pod.goalPct.toFixed(0)}%</div>
                    <div class="label">% to Goal</div>
                </div>
                <div class="card">
                    <div class="value green">${pod.greenPct.toFixed(1)}%</div>
                    <div class="label">Green Rate</div>
                </div>
                <div class="card">
                    <div class="value red">${pod.dropPct.toFixed(1)}%</div>
                    <div class="label">Drop Rate</div>
                </div>
                <div class="card">
                    <div class="value">${Math.round(pod.cv)}</div>
                    <div class="label">CV</div>
                </div>
            `;
            
            // Pod comparison
            const sortedPods = Object.values(data.pods).sort((a, b) => b.goalPct - a.goalPct);
            
            document.getElementById('comparisonRows').innerHTML = sortedPods.map((p, i) => `
                <div class="comparison-row ${p.code === currentPod ? 'current' : ''}">
                    <div>
                        <span class="rank">${i + 1}</span>
                        <span class="pod-name">${p.leader}</span>
                    </div>
                    <div class="pod-stats">${p.goalPct.toFixed(0)}% · ${p.signed}/${Math.round(p.goal)} · ${p.greenPct.toFixed(1)}% green</div>
                </div>
            `).join('');
            
            // Rep table
            const reps = pod.reps || [];
            const topRep = reps[0];
            
            document.getElementById('repRows').innerHTML = reps.map((rep, i) => {
                const goalClass = rep.goalPct >= 140 ? 'on-track' : rep.goalPct >= paceThreshold ? '' : 'critical';
                let flag = '';
                if (i === 0 && rep.goalPct > 0) flag = '<span class="flag top">TOP</span>';
                else if (rep.goalPct < paceThreshold && rep.goal > 0) flag = '<span class="flag alert">!</span>';
                
                return `
                    <div class="rep-row">
                        <div class="name">${rep.name}${flag}</div>
                        <div>${rep.leads || 0}</div>
                        <div>${rep.signed}</div>
                        <div>${rep.cv.toFixed(1)}</div>
                        <div class="drop-rate">${rep.drops}</div>
                        <div class="goal-pct ${goalClass} hide-mobile">${rep.goalPct.toFixed(0)}%</div>
                    </div>
                `;
            }).join('');
        }
        
        fetchData();
    </script>
</body>
</html>
